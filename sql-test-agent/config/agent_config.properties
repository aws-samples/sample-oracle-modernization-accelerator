# SQL Test Agent Configuration

# Retry Configuration
max.retries=3
retry.delay.seconds=2
min.confidence.threshold=0.7

# Comparison Configuration
acceptable.pass.rate=0.95
comparison.timeout.seconds=30
normalize.numeric.precision=true
normalize.datetime.format=true
normalize.string.trim=true
normalize.string.case.sensitive=false

# Execution Configuration
batch.size=10
connection.pool.size=5
query.timeout.seconds=60
enable.parallel.execution=true

# Logging Configuration
log.level=INFO
log.file.path=./logs/agent.log
log.include.sql=true
log.include.bind.variables=false
log.max.file.size.mb=100
log.max.backup.count=10

# Report Configuration
report.output.directory=./reports
report.format=json,html
report.include.transformation.history=true
report.include.performance.metrics=true

# Security Configuration
enable.ssl.connections=true
sanitize.error.messages=true
encrypt.credentials=false
