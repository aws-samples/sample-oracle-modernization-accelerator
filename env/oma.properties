[COMMON]
OMA_BASE_DIR=/home/ec2-user/workspace/oma
# ko,en
LANGUAGE=en
AWS_REGION=ap-northeast-2

# Bedrock LLM Configuration
BEDROCK_REGION=ap-northeast-2
BEDROCK_MODEL_ID=global.anthropic.claude-opus-4-7

# App Conversion Settings
MAX_WORKERS=4
ORACLE_HOME=/home/ec2-user/oracle
SOURCE_WORKSPACE=/home/ec2-user/workspace/source
TARGET_WORKSPACE=/home/ec2-user/workspace/target
ORACLE_DICT_PATH=${OMA_BASE_DIR}/app/output/oracle_dictionary.json
MAPPER_WORK_DIR=${OMA_BASE_DIR}/app/mappers

# Oracle Connection
ORACLE_HOST=your-oracle-host
ORACLE_PORT=1521
ORACLE_SID=your-oracle-sid
ORACLE_CONN_TYPE=service
ORACLE_USER=your-oracle-user
ORACLE_PASSWORD=your-oracle-password
ORACLE_SCHEMA=your-oracle-schema

# PostgreSQL Connection (Standard PG* variables)
PGHOST=your-aurora-cluster.cluster-xxxxxxxxxx.ap-northeast-2.rds.amazonaws.com
PGPORT=5432
PGDATABASE=your-database
PGSCHEMA=your-schema
PGUSER=your-pg-user
PGPASSWORD=your-pg-password

# MySQL Connection
MYSQL_HOST=your-aurora-cluster.cluster-xxxxxxxxxx.ap-northeast-2.rds.amazonaws.com
MYSQL_PORT=3306
MYSQL_DATABASE=your-database
MYSQL_USER=your-mysql-user
MYSQL_PASSWORD=your-mysql-password

# Target DB Type (postgres or mysql)
TARGET_DB_TYPE=postgres

# DMS SC Project Configuration (Optional - for schema conversion)
DMS_SC_S3_BUCKET=your-dms-sc-bucket-name
DMS_MIGRATION_PROJECT_ARN=arn:aws:dms:ap-northeast-2:123456789012:migration-project:YOUR_PROJECT_ID

# ========================================
# Application-Specific Section
# Used by CloudFormation deployment (deploy-omabox.sh / setEnv.sh)
# For App conversion, use [COMMON] section instead
# ========================================
[oma]
APPLICATION_NAME=oma
