# Spring AI MCP Server Configuration
spring.ai.mcp.server.enabled=true
spring.ai.mcp.server.name=pg-client-mcp
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.transport=sse
spring.ai.mcp.server.annotation-scanner.base-packages=com.example

server.port=9081

# OAuth2 Resource Server
spring.security.oauth2.resourceserver.jwt.issuer-uri=${COGNITO_ISSUER_URI:https://cognito-idp.us-east-1.amazonaws.com/us-east-1_CHANGE_ME}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${COGNITO_JWK_SET_URI:https://cognito-idp.us-east-1.amazonaws.com/us-east-1_CHANGE_ME/.well-known/jwks.json}

# Database Configuration
# Use 'secretsmanager' or 'password'
mcp.db.connection.type=${PG_CONNECTION_TYPE:secretsmanager}
# For secretsmanager: ARN of the secret
# For password: username:password@host:port/database
mcp.db.connection.detail=${PG_CONNECTION_DETAIL:arn:aws:secretsmanager:us-east-1:940597661534:secret:MMA-secret-aurora-admin}
mcp.db.connection.readonly=false
mcp.db.testcase.readonly=false

logging.level.root=INFO
logging.level.com.example=DEBUG
